<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cipher Translator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
      color: #111;
    }

    .container {
      width: 100%;
      max-width: 800px;
    }

    /* Mode toggle */
    .mode-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      flex-wrap: wrap;
    }

    .mode-row label {
      font-size: 14px;
      color: #555;
      white-space: nowrap;
    }

    .toggle-group {
      display: flex;
      border: 1px solid #ccc;
      border-radius: 6px;
      overflow: hidden;
    }

    .toggle-group button {
      flex: 1;
      padding: 6px 14px;
      border: none;
      background: #f0f0f0;
      color: #555;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .toggle-group button.active {
      background: #333;
      color: #fff;
    }

    .mode-description {
      font-size: 12px;
      color: #888;
      margin-left: auto;
    }

    /* Shift Control */
    .shift-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
    }

    .shift-row label {
      font-size: 14px;
      color: #555;
    }

    .shift-row input[type="range"] {
      width: 200px;
    }

    #shift-out {
      font-size: 14px;
      font-weight: 600;
      min-width: 30px;
    }

    /* Monoalphabetic Key Control */
    .mono-row {
      display: none;
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
    }

    .mono-row.visible {
      display: block;
    }

    .mono-row > label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: block;
      margin-bottom: 8px;
    }

    .mono-row textarea {
      width: 100%;
      height: 56px;
      border: none;
      outline: none;
      resize: none;
      font-family: monospace;
      font-size: 0.9rem;
      color: #111;
      background: transparent;
      border-bottom: 1px solid #ddd;
      padding-bottom: 8px;
      margin-bottom: 10px;
    }

    .key-buttons {
      display: flex;
      gap: 10px;
    }

    .key-buttons button {
      flex: 1;
      padding: 7px 12px;
      border: 1px solid #999;
      background: #f0f0f0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      color: #333;
      transition: all 0.2s;
    }

    .key-buttons button:hover {
      background: #e0e0e0;
      border-color: #666;
    }

    /* Input/Output Panels */
    .io-container {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      width: 100%;
    }

    .panel {
      flex: 1;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 1rem;
    }

    .panel label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: block;
      margin-bottom: 8px;
    }

    .panel textarea {
      width: 100%;
      height: 160px;
      border: none;
      outline: none;
      resize: none;
      font-family: monospace;
      font-size: 1rem;
      color: #111;
      background: transparent;
    }

    .panel textarea:read-only {
      color: #666;
    }

    /* Action Buttons */
    .button-row {
      display: flex;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    button.action-btn {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #333;
      background: #333;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      transition: all 0.2s;
    }

    button.action-btn:hover {
      background: #555;
      border-color: #555;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Cipher Translator</h1>

    <!-- Mode Toggle -->
    <div class="mode-row">
      <label>Mode</label>
      <div class="toggle-group">
        <button id="btn-caesar-hex" class="active" onclick="setMode('caesar-hex')">Caesar + Hex</button>
        <button id="btn-hex" onclick="setMode('hex')">Hex Only</button>
        <button id="btn-mono-all" onclick="setMode('mono-all')">Mono + Caesar + Hex</button>
      </div>
      <span class="mode-description" id="mode-desc">Shifts letters, then encodes as hex</span>
    </div>

    <!-- Caesar Shift Control -->
    <div id="caesar-controls" class="shift-row">
      <label for="shift">Caesar Shift</label>
      <input type="range" id="shift" min="-25" max="25" value="3" step="1"
        oninput="document.getElementById('shift-out').textContent = this.value;" />
      <span id="shift-out">3</span>
    </div>

    <!-- Monoalphabetic Key Control -->
    <div id="mono-controls" class="mono-row">
      <label>Substitution Key (26 unique letters, A–Z)</label>
      <textarea id="mono-key" placeholder="Enter 26 unique letters A–Z, e.g. QWERTYUIOPASDFGHJKLZXCVBNM"></textarea>
      <div class="key-buttons">
        <button onclick="generateRandomMonoKey()">Generate Random Key</button>
        <button onclick="resetMonoKey()">Reset to Default</button>
      </div>
    </div>

    <!-- Input/Output Panels -->
    <div class="io-container">
      <div class="panel">
        <label for="input-text">Input</label>
        <textarea id="input-text" placeholder="Enter text to encode or decode..."></textarea>
      </div>
      <div class="panel">
        <label for="output-text">Output</label>
        <textarea id="output-text" readonly placeholder="Result will appear here..."></textarea>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="button-row">
      <button class="action-btn" onclick="performEncode()">Encode</button>
      <button class="action-btn" onclick="performDecode()">Decode</button>
    </div>
  </div>

  <script>
    let currentMode = 'caesar-hex';

    const DEFAULT_MONO_KEY = 'QWERTYUIOPASDFGHJKLZXCVBNM';

    const DESCRIPTIONS = {
      'caesar-hex':  'Shifts letters by Caesar amount, then encodes as hex',
      'hex':         'Encodes text directly to hex with no shift',
      'mono-all':    'Applies monoalphabetic substitution → Caesar shift → hex encoding'
    };

    function setMode(mode) {
      currentMode = mode;

      document.getElementById('btn-caesar-hex').classList.toggle('active', mode === 'caesar-hex');
      document.getElementById('btn-hex').classList.toggle('active', mode === 'hex');
      document.getElementById('btn-mono-all').classList.toggle('active', mode === 'mono-all');

      // Caesar shift visible for caesar-hex and mono-all
      document.getElementById('caesar-controls').style.display =
        (mode === 'caesar-hex' || mode === 'mono-all') ? 'flex' : 'none';

      // Mono key visible only for mono-all
      document.getElementById('mono-controls').classList.toggle('visible', mode === 'mono-all');

      document.getElementById('mode-desc').textContent = DESCRIPTIONS[mode];
      document.getElementById('output-text').value = '';
    }

    // ===== MONOALPHABETIC HELPERS =====
    function generateRandomMonoKey() {
      const alpha = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
      for (let i = alpha.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [alpha[i], alpha[j]] = [alpha[j], alpha[i]];
      }
      document.getElementById('mono-key').value = alpha.join('');
    }

    function resetMonoKey() {
      document.getElementById('mono-key').value = DEFAULT_MONO_KEY;
    }

    function getMonoKey() {
      let key = document.getElementById('mono-key').value.toUpperCase().trim();
      if (!key) {
        key = DEFAULT_MONO_KEY;
        document.getElementById('mono-key').value = key;
      }
      if (key.length !== 26) throw new Error('Substitution key must be exactly 26 characters');
      if (new Set(key).size !== 26) throw new Error('Substitution key must contain 26 unique letters');
      return key;
    }

    // ===== CAESAR HELPERS =====
    function caesarShift(text, shift) {
      return text.split('').map(char => {
        if (char >= 'A' && char <= 'Z')
          return String.fromCharCode(((char.charCodeAt(0) - 65 + shift) % 26 + 26) % 26 + 65);
        if (char >= 'a' && char <= 'z')
          return String.fromCharCode(((char.charCodeAt(0) - 97 + shift) % 26 + 26) % 26 + 97);
        return char;
      }).join('');
    }

    // ===== HEX HELPERS =====
    function toHex(text) {
      return text.split('').map(c =>
        c.charCodeAt(0).toString(16).toUpperCase().padStart(2, '0')
      ).join(' ');
    }

    function fromHex(hexStr) {
      const parts = hexStr.trim().split(/\s+/).filter(h => h.length > 0);
      return parts.map(h => {
        const num = parseInt(h, 16);
        if (isNaN(num)) throw new Error('Invalid hex value: ' + h);
        return String.fromCharCode(num);
      }).join('');
    }

    // ===== MONO + CAESAR + HEX =====
    function encodeMonoAll() {
      const plaintext = document.getElementById('input-text').value;
      if (!plaintext) { document.getElementById('output-text').value = ''; return; }

      try {
        const key = getMonoKey();
        const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const shift = parseInt(document.getElementById('shift').value);

        // Step 1: Monoalphabetic substitution
        const monoSubbed = plaintext.split('').map(char => {
          const upper = char.toUpperCase();
          if (upper >= 'A' && upper <= 'Z') {
            const substituted = key[alphabet.indexOf(upper)];
            return char === upper ? substituted : substituted.toLowerCase();
          }
          return char;
        }).join('');

        // Step 2: Caesar shift
        const shifted = caesarShift(monoSubbed, shift);

        // Step 3: Hex encode
        document.getElementById('output-text').value = toHex(shifted);
      } catch (e) {
        document.getElementById('output-text').value = 'Error: ' + e.message;
      }
    }

    function decodeMonoAll() {
      const hexInput = document.getElementById('input-text').value.trim();
      if (!hexInput) { document.getElementById('output-text').value = ''; return; }

      try {
        const key = getMonoKey();
        const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const shift = parseInt(document.getElementById('shift').value);

        // Step 1: Hex decode
        const fromHexText = fromHex(hexInput);

        // Step 2: Reverse Caesar shift
        const unshifted = caesarShift(fromHexText, -shift);

        // Step 3: Reverse monoalphabetic substitution
        const decoded = unshifted.split('').map(char => {
          const upper = char.toUpperCase();
          if (upper >= 'A' && upper <= 'Z') {
            const index = key.indexOf(upper);
            if (index === -1) throw new Error('Character not found in key: ' + upper);
            const original = alphabet[index];
            return char === upper ? original : original.toLowerCase();
          }
          return char;
        }).join('');

        document.getElementById('output-text').value = decoded;
      } catch (e) {
        document.getElementById('output-text').value = 'Error: ' + e.message;
      }
    }

    // ===== CAESAR + HEX =====
    function encodeCaesarHex() {
      const plaintext = document.getElementById('input-text').value;
      if (!plaintext) { document.getElementById('output-text').value = ''; return; }
      const shift = parseInt(document.getElementById('shift').value);
      document.getElementById('output-text').value = toHex(caesarShift(plaintext, shift));
    }

    function decodeCaesarHex() {
      const hexInput = document.getElementById('input-text').value.trim();
      if (!hexInput) { document.getElementById('output-text').value = ''; return; }
      try {
        const shift = parseInt(document.getElementById('shift').value);
        document.getElementById('output-text').value = caesarShift(fromHex(hexInput), -shift);
      } catch (e) {
        document.getElementById('output-text').value = 'Error: ' + e.message;
      }
    }

    // ===== HEX ONLY =====
    function encodeHex() {
      const plaintext = document.getElementById('input-text').value;
      if (!plaintext) { document.getElementById('output-text').value = ''; return; }
      document.getElementById('output-text').value = toHex(plaintext);
    }

    function decodeHex() {
      const hexInput = document.getElementById('input-text').value.trim();
      if (!hexInput) { document.getElementById('output-text').value = ''; return; }
      try {
        document.getElementById('output-text').value = fromHex(hexInput);
      } catch (e) {
        document.getElementById('output-text').value = 'Error: ' + e.message;
      }
    }

    // ===== UNIFIED =====
    function performEncode() {
      if (currentMode === 'caesar-hex') encodeCaesarHex();
      else if (currentMode === 'hex') encodeHex();
      else if (currentMode === 'mono-all') encodeMonoAll();
    }

    function performDecode() {
      if (currentMode === 'caesar-hex') decodeCaesarHex();
      else if (currentMode === 'hex') decodeHex();
      else if (currentMode === 'mono-all') decodeMonoAll();
    }
  </script>

</body>
</html>
