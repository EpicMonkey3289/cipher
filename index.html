<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caesar Cipher & ASCII Hex Converter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
      color: #111;
    }

    .shift-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .shift-row label {
      font-size: 14px;
      color: #555;
    }

    .shift-row input[type="range"] {
      width: 200px;
    }

    #shift-out {
      font-size: 14px;
      font-weight: 600;
      min-width: 30px;
    }

    .panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 1rem;
      width: 100%;
      max-width: 700px;
      margin-bottom: 1.5rem;
    }

    .panel label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: block;
      margin-bottom: 8px;
    }

    .panel textarea {
      width: 100%;
      height: 140px;
      border: none;
      outline: none;
      resize: none;
      font-family: monospace;
      font-size: 1.1rem;
      color: #111;
      background: transparent;
    }

    .container {
      width: 100%;
      max-width: 700px;
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-bottom: 1.5rem;
      width: 100%;
      max-width: 700px;
    }

    button {
      flex: 1;
      padding: 10px 16px;
      border: 2px solid #333;
      background: #333;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      transition: all 0.2s;
    }

    button:hover {
      background: #555;
      border-color: #555;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Caesar Cipher & ASCII Hex Converter</h1>

    <div class="shift-row">
      <label for="shift">Caesar Shift</label>
      <input type="range" id="shift" min="-25" max="25" value="3" step="1"
        oninput="document.getElementById('shift-out').textContent = this.value;" />
      <span id="shift-out">3</span>
    </div>

    <div class="button-row">
      <button onclick="translate()">Translate</button>
    </div>

    <div class="panel">
      <label for="input">Input (Text or Hex)</label>
      <textarea id="input" placeholder="Type text or hex here..."></textarea>
    </div>

    <div class="panel">
      <label>Encoded (Caesar + Hex)</label>
      <textarea id="encoded" readonly placeholder="Encoded output..."></textarea>
    </div>

    <div class="panel">
      <label>Decoded (Back to English)</label>
      <textarea id="decoded" readonly placeholder="Decoded output..."></textarea>
    </div>
  </div>

  <script>
    function translate() {
      const input = document.getElementById('input').value;
      const shift = parseInt(document.getElementById('shift').value);
      let encoded = '';
      let decoded = '';

      if (!input) {
        document.getElementById('encoded').value = '';
        document.getElementById('decoded').value = '';
        return;
      }

      // Step 1: Caesar cipher
      const caesarEncoded = input.split('').map(char => {
        if (char >= 'A' && char <= 'Z') {
          return String.fromCharCode(((char.charCodeAt(0) - 65 + shift) % 26 + 26) % 26 + 65);
        }
        if (char >= 'a' && char <= 'z') {
          return String.fromCharCode(((char.charCodeAt(0) - 97 + shift) % 26 + 26) % 26 + 97);
        }
        return char;
      }).join('');

      // Step 2: Convert to hex
      encoded = caesarEncoded.split('').map(char => {
        return char.charCodeAt(0).toString(16).toUpperCase().padStart(2, '0');
      }).join(' ');

      // Step 3: Decode - check if input is hex
      const trimmed = input.trim();
      const isHex = /^[0-9A-Fa-f\s]+$/.test(trimmed) && trimmed.length > 0;

      if (isHex) {
        try {
          const hexArray = trimmed.split(/\s+/).filter(h => h.length > 0);
          const hexToText = hexArray.map(h => {
            const num = parseInt(h, 16);
            if (isNaN(num)) throw new Error('Invalid');
            return String.fromCharCode(num);
          }).join('');

          // Reverse Caesar shift
          decoded = hexToText.split('').map(char => {
            if (char >= 'A' && char <= 'Z') {
              return String.fromCharCode(((char.charCodeAt(0) - 65 - shift) % 26 + 26) % 26 + 65);
            }
            if (char >= 'a' && char <= 'z') {
              return String.fromCharCode(((char.charCodeAt(0) - 97 - shift) % 26 + 26) % 26 + 97);
            }
            return char;
          }).join('');
        } catch (e) {
          decoded = 'Invalid hex input';
        }
      } else {
        // Input is text - reverse Caesar shift
        decoded = input.split('').map(char => {
          if (char >= 'A' && char <= 'Z') {
            return String.fromCharCode(((char.charCodeAt(0) - 65 - shift) % 26 + 26) % 26 + 65);
          }
          if (char >= 'a' && char <= 'z') {
            return String.fromCharCode(((char.charCodeAt(0) - 97 - shift) % 26 + 26) % 26 + 97);
          }
          return char;
        }).join('');
      }

      document.getElementById('encoded').value = encoded;
      document.getElementById('decoded').value = decoded;
    }
  </script>

</body>
</html>
