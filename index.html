<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caesar Cipher & ASCII Hex Converter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
      color: #111;
    }

    .shift-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .shift-row label {
      font-size: 14px;
      color: #555;
    }

    .shift-row input[type="range"] {
      width: 200px;
    }

    #shift-out {
      font-size: 14px;
      font-weight: 600;
      min-width: 30px;
    }

    .panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 1rem;
      width: 100%;
      max-width: 700px;
      margin-bottom: 1.5rem;
    }

    .panel label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: block;
      margin-bottom: 8px;
    }

    .panel textarea {
      width: 100%;
      height: 140px;
      border: none;
      outline: none;
      resize: none;
      font-family: monospace;
      font-size: 1.1rem;
      color: #111;
      background: transparent;
    }

    .container {
      width: 100%;
      max-width: 700px;
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-bottom: 1.5rem;
      width: 100%;
      max-width: 700px;
    }

    button {
      flex: 1;
      padding: 10px 16px;
      border: 2px solid #333;
      background: #333;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      transition: all 0.2s;
    }

    button:hover {
      background: #555;
      border-color: #555;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Caesar Cipher & ASCII Hex Converter</h1>

    <div class="shift-row">
      <label for="shift">Caesar Shift</label>
      <input type="range" id="shift" min="-25" max="25" value="3" step="1"
        oninput="document.getElementById('shift-out').textContent = this.value;" />
      <span id="shift-out">3</span>
    </div>

    <div class="button-row">
      <button onclick="encode()">Encode</button>
      <button onclick="decode()">Decode</button>
    </div>

    <div class="panel">
      <label for="plaintext">Plaintext Input</label>
      <textarea id="plaintext" placeholder="Type text here to encode..."></textarea>
    </div>

    <div class="panel">
      <label for="encoded">Encoded (Caesar + Hex)</label>
      <textarea id="encoded" readonly placeholder="Encoded output will appear here..."></textarea>
    </div>

    <div class="panel">
      <label for="hexinput">Hex Input (to decode)</label>
      <textarea id="hexinput" placeholder="Paste hex here to decode back to plaintext..."></textarea>
    </div>

    <div class="panel">
      <label for="decoded">Decoded Plaintext</label>
      <textarea id="decoded" readonly placeholder="Decoded output will appear here..."></textarea>
    </div>
  </div>

  <script>
    function encode() {
      const plaintext = document.getElementById('plaintext').value;
      const shift = parseInt(document.getElementById('shift').value);

      if (!plaintext) {
        document.getElementById('encoded').value = '';
        return;
      }

      // Step 1: Apply Caesar cipher
      const caesarEncoded = plaintext.split('').map(char => {
        if (char >= 'A' && char <= 'Z') {
          return String.fromCharCode(((char.charCodeAt(0) - 65 + shift) % 26 + 26) % 26 + 65);
        }
        if (char >= 'a' && char <= 'z') {
          return String.fromCharCode(((char.charCodeAt(0) - 97 + shift) % 26 + 26) % 26 + 97);
        }
        return char;
      }).join('');

      // Step 2: Convert to hex
      const encoded = caesarEncoded.split('').map(char => {
        return char.charCodeAt(0).toString(16).toUpperCase().padStart(2, '0');
      }).join(' ');

      document.getElementById('encoded').value = encoded;
    }

    function decode() {
      const hexinput = document.getElementById('hexinput').value.trim();
      const shift = parseInt(document.getElementById('shift').value);

      if (!hexinput) {
        document.getElementById('decoded').value = '';
        return;
      }

      try {
        // Step 1: Convert hex to text
        const hexArray = hexinput.split(/\s+/).filter(h => h.length > 0);
        const hexToText = hexArray.map(h => {
          const num = parseInt(h, 16);
          if (isNaN(num)) throw new Error('Invalid hex');
          return String.fromCharCode(num);
        }).join('');

        // Step 2: Reverse Caesar shift
        const decoded = hexToText.split('').map(char => {
          if (char >= 'A' && char <= 'Z') {
            return String.fromCharCode(((char.charCodeAt(0) - 65 - shift) % 26 + 26) % 26 + 65);
          }
          if (char >= 'a' && char <= 'z') {
            return String.fromCharCode(((char.charCodeAt(0) - 97 - shift) % 26 + 26) % 26 + 97);
          }
          return char;
        }).join('');

        document.getElementById('decoded').value = decoded;
      } catch (e) {
        document.getElementById('decoded').value = 'Invalid hex input: ' + e.message;
      }
    }
  </script>

</body>
</html>
