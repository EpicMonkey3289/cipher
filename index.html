<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Combined Cipher Translator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
      color: #111;
    }

    .container {
      width: 100%;
      max-width: 800px;
    }

    /* Cipher Selection */
    .cipher-selector {
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      width: 100%;
    }

    .cipher-selector label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: block;
      margin-bottom: 8px;
    }

    .cipher-selector select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    /* Caesar Cipher Controls */
    .shift-row {
      display: none;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
    }

    .shift-row.active {
      display: flex;
    }

    .shift-row label {
      font-size: 14px;
      color: #555;
    }

    .shift-row input[type="range"] {
      width: 200px;
    }

    #shift-out {
      font-size: 14px;
      font-weight: 600;
      min-width: 30px;
    }

    /* Monoalphabetic Key Controls */
    .monoalphabetic-key {
      display: none;
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      width: 100%;
    }

    .monoalphabetic-key.active {
      display: block;
    }

    .monoalphabetic-key label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: block;
      margin-bottom: 8px;
    }

    .monoalphabetic-key textarea {
      width: 100%;
      height: 60px;
      border: none;
      outline: none;
      resize: none;
      font-family: monospace;
      font-size: 0.9rem;
      color: #111;
      background: transparent;
      border-bottom: 1px solid #ddd;
      padding-bottom: 8px;
      margin-bottom: 10px;
    }

    .key-buttons {
      display: flex;
      gap: 10px;
    }

    .key-buttons button {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #999;
      background: #f0f0f0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      color: #333;
      transition: all 0.2s;
    }

    .key-buttons button:hover {
      background: #e0e0e0;
      border-color: #666;
    }

    /* Input/Output Panels */
    .io-container {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      width: 100%;
    }

    .panel {
      flex: 1;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 1rem;
    }

    .panel label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: block;
      margin-bottom: 8px;
    }

    .panel textarea {
      width: 100%;
      height: 160px;
      border: none;
      outline: none;
      resize: none;
      font-family: monospace;
      font-size: 1rem;
      color: #111;
      background: transparent;
    }

    .panel textarea:read-only {
      color: #666;
    }

    /* Action Buttons */
    .button-row {
      display: flex;
      gap: 10px;
      margin-bottom: 1.5rem;
      width: 100%;
    }

    button.action-btn {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #333;
      background: #333;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      transition: all 0.2s;
    }

    button.action-btn:hover {
      background: #555;
      border-color: #555;
    }

    .swap-btn {
      padding: 8px 12px;
      border: 2px solid #666;
      background: #f0f0f0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: #333;
      transition: all 0.2s;
    }

    .swap-btn:hover {
      background: #e0e0e0;
    }

    .button-row-with-swap {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .button-row-with-swap .action-btn {
      flex: 1;
    }

    .button-row-with-swap .swap-btn {
      flex: 0;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Combined Cipher Translator</h1>

    <!-- Cipher Type Selection -->
    <div class="cipher-selector">
      <label for="cipher-type">Select Cipher</label>
      <select id="cipher-type" onchange="switchCipher()">
        <option value="caesar">Caesar Cipher</option>
        <option value="monoalphabetic">Monoalphabetic Cipher</option>
        <option value="hex">Hex Encoding</option>
      </select>
    </div>

    <!-- Caesar Shift Control -->
    <div id="caesar-controls" class="shift-row active">
      <label for="shift">Shift</label>
      <input type="range" id="shift" min="-25" max="25" value="3" step="1"
        oninput="document.getElementById('shift-out').textContent = this.value;" />
      <span id="shift-out">3</span>
    </div>

    <!-- Monoalphabetic Key Control -->
    <div id="monoalphabetic-controls" class="monoalphabetic-key">
      <label for="mono-key">Substitution Key (A-Z)</label>
      <textarea id="mono-key" placeholder="Enter 26 unique letters (A-Z). Default: BCDEFGHIJKLMNOPQRSTUVWXYZAA"></textarea>
      <div class="key-buttons">
        <button onclick="generateRandomMonoKey()">Generate Random Key</button>
        <button onclick="resetMonoKey()">Reset to Default</button>
      </div>
    </div>

    <!-- Input/Output Panels -->
    <div class="io-container">
      <div class="panel">
        <label for="input-text">Input</label>
        <textarea id="input-text" placeholder="Enter text to encode or decode..."></textarea>
      </div>
      <div class="panel">
        <label for="output-text">Output</label>
        <textarea id="output-text" readonly placeholder="Result will appear here..."></textarea>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="button-row-with-swap">
      <button class="action-btn" onclick="performEncode()">Encode</button>
      <button class="action-btn" onclick="performDecode()">Decode</button>
      <button class="swap-btn" onclick="swapInputOutput()">⇅ Swap</button>
    </div>
  </div>

  <script>
    const DEFAULT_MONO_KEY = 'BCDEFGHIJKLMNOPQRSTUVWXYZAA';

    function switchCipher() {
      const cipherType = document.getElementById('cipher-type').value;
      
      // Toggle Caesar controls
      const caesarControls = document.getElementById('caesar-controls');
      caesarControls.classList.toggle('active', cipherType === 'caesar');

      // Toggle Monoalphabetic controls
      const monoControls = document.getElementById('monoalphabetic-controls');
      monoControls.classList.toggle('active', cipherType === 'monoalphabetic');

      // Clear output when switching
      document.getElementById('output-text').value = '';
    }

    function swapInputOutput() {
      const input = document.getElementById('input-text');
      const output = document.getElementById('output-text');
      const temp = input.value;
      input.value = output.value;
      output.value = temp;
    }

    // ===== CAESAR CIPHER =====
    function encodeCaesar() {
      const plaintext = document.getElementById('input-text').value;
      const shift = parseInt(document.getElementById('shift').value);

      if (!plaintext) {
        document.getElementById('output-text').value = '';
        return;
      }

      const caesarEncoded = plaintext.split('').map(char => {
        if (char >= 'A' && char <= 'Z') {
          return String.fromCharCode(((char.charCodeAt(0) - 65 + shift) % 26 + 26) % 26 + 65);
        }
        if (char >= 'a' && char <= 'z') {
          return String.fromCharCode(((char.charCodeAt(0) - 97 + shift) % 26 + 26) % 26 + 97);
        }
        return char;
      }).join('');

      const encoded = caesarEncoded.split('').map(char => {
        return char.charCodeAt(0).toString(16).toUpperCase().padStart(2, '0');
      }).join(' ');

      document.getElementById('output-text').value = encoded;
    }

    function decodeCaesar() {
      const hexinput = document.getElementById('input-text').value.trim();
      const shift = parseInt(document.getElementById('shift').value);

      if (!hexinput) {
        document.getElementById('output-text').value = '';
        return;
      }

      try {
        const hexArray = hexinput.split(/\s+/).filter(h => h.length > 0);
        const hexToText = hexArray.map(h => {
          const num = parseInt(h, 16);
          if (isNaN(num)) throw new Error('Invalid hex');
          return String.fromCharCode(num);
        }).join('');

        const decoded = hexToText.split('').map(char => {
          if (char >= 'A' && char <= 'Z') {
            return String.fromCharCode(((char.charCodeAt(0) - 65 - shift) % 26 + 26) % 26 + 65);
          }
          if (char >= 'a' && char <= 'z') {
            return String.fromCharCode(((char.charCodeAt(0) - 97 - shift) % 26 + 26) % 26 + 97);
          }
          return char;
        }).join('');

        document.getElementById('output-text').value = decoded;
      } catch (e) {
        document.getElementById('output-text').value = 'Error: ' + e.message;
      }
    }

    // ===== MONOALPHABETIC CIPHER =====
    function generateRandomMonoKey() {
      const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
      for (let i = alphabet.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [alphabet[i], alphabet[j]] = [alphabet[j], alphabet[i]];
      }
      document.getElementById('mono-key').value = alphabet.join('');
    }

    function resetMonoKey() {
      document.getElementById('mono-key').value = DEFAULT_MONO_KEY;
    }

    function getMonoalphabeticKey() {
      let key = document.getElementById('mono-key').value.toUpperCase().trim();
      if (!key) {
        key = DEFAULT_MONO_KEY;
        document.getElementById('mono-key').value = key;
      }
      if (key.length !== 26) {
        throw new Error('Key must be exactly 26 characters');
      }
      const uniqueChars = new Set(key);
      if (uniqueChars.size !== 26) {
        throw new Error('Key must contain 26 unique letters');
      }
      return key;
    }

    function encodeMonoalphabetic() {
      const plaintext = document.getElementById('input-text').value;
      if (!plaintext) {
        document.getElementById('output-text').value = '';
        return;
      }

      try {
        const key = getMonoalphabeticKey();
        const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        
        const encoded = plaintext.split('').map(char => {
          const upper = char.toUpperCase();
          if (upper >= 'A' && upper <= 'Z') {
            const index = alphabet.indexOf(upper);
            return key[index];
          }
          return char;
        }).join('');

        const hexEncoded = encoded.split('').map(char => {
          return char.charCodeAt(0).toString(16).toUpperCase().padStart(2, '0');
        }).join(' ');

        document.getElementById('output-text').value = hexEncoded;
      } catch (e) {
        document.getElementById('output-text').value = 'Error: ' + e.message;
      }
    }

    function decodeMonoalphabetic() {
      const hexinput = document.getElementById('input-text').value.trim();
      if (!hexinput) {
        document.getElementById('output-text').value = '';
        return;
      }

      try {
        const key = getMonoalphabeticKey();
        const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

        const hexArray = hexinput.split(/\s+/).filter(h => h.length > 0);
        const decoded = hexArray.map(h => {
          const num = parseInt(h, 16);
          if (isNaN(num)) throw new Error('Invalid hex');
          const char = String.fromCharCode(num);
          const upper = char.toUpperCase();
          
          if (upper >= 'A' && upper <= 'Z') {
            const index = key.indexOf(upper);
            if (index === -1) throw new Error('Character not in key');
            return alphabet[index];
          }
          return char;
        }).join('');

        document.getElementById('output-text').value = decoded;
      } catch (e) {
        document.getElementById('output-text').value = 'Error: ' + e.message;
      }
    }

    // ===== HEX ENCODING =====
    function encodeHex() {
      const plaintext = document.getElementById('input-text').value;

      if (!plaintext) {
        document.getElementById('output-text').value = '';
        return;
      }

      const encoded = plaintext.split('').map(char => {
        return char.charCodeAt(0).toString(16).toUpperCase().padStart(2, '0');
      }).join(' ');

      document.getElementById('output-text').value = encoded;
    }

    function decodeHex() {
      const hexinput = document.getElementById('input-text').value.trim();

      if (!hexinput) {
        document.getElementById('output-text').value = '';
        return;
      }

      try {
        const hexArray = hexinput.split(/\s+/).filter(h => h.length > 0);
        const decoded = hexArray.map(h => {
          const num = parseInt(h, 16);
          if (isNaN(num)) throw new Error('Invalid hex');
          return String.fromCharCode(num);
        }).join('');

        document.getElementById('output-text').value = decoded;
      } catch (e) {
        document.getElementById('output-text').value = 'Error: ' + e.message;
      }
    }

    // ===== UNIFIED ENCODE/DECODE =====
    function performEncode() {
      const cipherType = document.getElementById('cipher-type').value;
      
      if (cipherType === 'caesar') {
        encodeCaesar();
      } else if (cipherType === 'monoalphabetic') {
        encodeMonoalphabetic();
      } else if (cipherType === 'hex') {
        encodeHex();
      }
    }

    function performDecode() {
      const cipherType = document.getElementById('cipher-type').value;
      
      if (cipherType === 'caesar') {
        decodeCaesar();
      } else if (cipherType === 'monoalphabetic') {
        decodeMonoalphabetic();
      } else if (cipherType === 'hex') {
        decodeHex();
      }
    }
  </script>

</body>
</html>
